name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate phase-one compatibility
        run: node scripts/validate-plugin.js --phase-one

      - name: Validate full parity surface
        run: node scripts/validate-plugin.js --full-parity-surface

      - name: Validate full parity behavior
        run: node scripts/validate-plugin.js --full-parity-behavior

      - name: Compile Gemini preview helper
        run: python -m py_compile plugins/ccg/skills/ccg-executor/scripts/invoke_gemini_preview.py

      - name: Run fixture tests
        run: node scripts/run-fixture-tests.js
