name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate plugin manifests and JavaScript
        run: node scripts/validate-plugin.js

      - name: Compile Gemini preview helper
        run: python -m py_compile plugins/ccg/skills/ccg-executor/scripts/invoke_gemini_preview.py

      - name: Run fixture tests
        run: node scripts/run-fixture-tests.js
